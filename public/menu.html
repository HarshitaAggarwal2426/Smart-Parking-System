<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>
<div class="dashboard">

    
    <div class="sidebar">
        <h2><i class="fas fa-car-side"></i> Parking</h2>
        <a href="park.html"><i class="fas fa-car"></i> Park</a>
        <a href="exit.html"><i class="fas fa-sign-out-alt"></i> Exit</a>
        <a href="slots.html"><i class="fas fa-layer-group"></i> Slots</a>
        <a href="search.html"><i class="fas fa-search"></i> Search</a>
        <a href="vip.html"><i class="fas fa-crown"></i> VIP</a>
        <a href="emergency.html"><i class="fas fa-ambulance"></i> Emergency</a>
        <a href="forceexit.html"><i class="fas fa-lock"></i> Force Exit</a>
        <a href="admin.html"><i class="fas fa-user-shield"></i> Admin</a>
    </div>

   
    <div class="main-content fade-in">
        <h1>Dashboard Overview</h1>

        <div class="stats">
            <div class="stat-card">
                <i class="fas fa-car"></i>
                <h3>Total Vehicles</h3>
                 <span id="total"></span>
            </div>

            <div class="stat-card">
                <i class="fas fa-parking"></i>
                <h3>Available Slots</h3>
                 <span id="slots"></span>
            </div>
        </div>
    </div>

</div>
<script src="js/app.js"></script>
</body>
</html>
