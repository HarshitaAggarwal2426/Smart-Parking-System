<!DOCTYPE html>
<html>
<head>
    <title>Emergency Parking</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>
<div class="container">
    <h2>🚑 Emergency Parking</h2>

    <form id="emergencyForm" class="form-box">
        <input type="text" id="vehicle" placeholder="Vehicle Number" required>
        <input type="text" id="phone" placeholder="Enter Mobile Number" required>
        <button type="submit" class="btn">Park Emergency</button>
    </form>

    <pre id="output" class="output-box"></pre>

    <a href="menu.html" class="back-btn">⬅ Back to Menu</a>
</div>

<script>
document.getElementById("emergencyForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    // const vehicle = document.getElementById("vehicle").value;

    const vehicle = document.getElementById("vehicle").value.trim();
    const phone = document.getElementById("phone").value.trim();

    const response = await fetch("/run", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            // input: `6\n${vehicle}\n`
            input: `6\n${vehicle}\n${phone}\n`
        })
    });

    const data = await response.text();
    document.getElementById("output").innerText = data;
});
</script>
<script src="js/app.js"></script>
</body>
</html>
